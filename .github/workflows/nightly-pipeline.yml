name: Nightly Pipeline

on:
  schedule:
    # 11pm AWST = 15:00 UTC, Mon–Fri
    - cron: '0 15 * * 1-5'
  workflow_dispatch:
    inputs:
      parliament:
        description: 'Parliament ID (fed_hor, fed_sen, wa_la)'
        required: false
        default: 'fed_hor'
      date:
        description: 'Date to process (YYYY-MM-DD, default: today)'
        required: false
        default: ''
      skip_audio:
        description: 'Skip audio pipeline'
        required: false
        type: boolean
        default: true

jobs:
  pipeline:
    name: Run pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPEN_AUSTRALIA_API_KEY: ${{ secrets.OPEN_AUSTRALIA_API_KEY }}
          TVFY_API_KEY: ${{ secrets.TVFY_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          PARLIAMENT="${{ github.event.inputs.parliament || 'fed_hor' }}"
          DATE_ARG="${{ github.event.inputs.date }}"
          SKIP_AUDIO="${{ github.event.inputs.skip_audio || 'true' }}"

          ARGS="--parliament $PARLIAMENT"
          if [ -n "$DATE_ARG" ]; then
            ARGS="$ARGS --date $DATE_ARG"
          fi
          if [ "$SKIP_AUDIO" = "true" ]; then
            ARGS="$ARGS --skip-audio"
          fi

          npx ts-node packages/pipeline/src/index.ts $ARGS

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Pipeline failed — check logs above"
          # TODO: Add Slack/email webhook here
