name: Nightly Pipeline

on:
  schedule:
    # 11pm AWST = 15:00 UTC, Mon–Fri
    - cron: '0 15 * * 1-5'
  workflow_dispatch:
    inputs:
      parliament:
        description: 'Parliament ID (fed_hor or fed_sen)'
        required: false
        default: 'fed_hor'
      date:
        description: 'Date to process (YYYY-MM-DD, default: today)'
        required: false
        default: ''
      skip_audio:
        description: 'Skip audio pipeline'
        required: false
        type: boolean
        default: false

jobs:
  pipeline:
    name: ${{ matrix.parliament }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        parliament: ${{ github.event_name == 'schedule' && fromJSON('["fed_hor","fed_sen"]') || fromJSON(format('["{0}"]', github.event.inputs.parliament || 'fed_hor')) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Restore audio cache
        uses: actions/cache@v4
        with:
          path: /tmp/on-notice-audio-*
          key: audio-v2-${{ matrix.parliament }}-${{ github.event.inputs.date || 'today' }}

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPEN_AUSTRALIA_API_KEY: ${{ secrets.OPEN_AUSTRALIA_API_KEY }}
          TVFY_API_KEY: ${{ secrets.TVFY_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_CDN_URL: ${{ secrets.R2_CDN_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          ARGS="--parliament ${{ matrix.parliament }}"
          DATE_ARG="${{ github.event.inputs.date }}"
          if [ -n "$DATE_ARG" ]; then
            ARGS="$ARGS --date $DATE_ARG"
          fi
          if [ "${{ github.event.inputs.skip_audio || 'false' }}" = "true" ]; then
            ARGS="$ARGS --skip-audio"
          fi
          npx ts-node packages/pipeline/src/index.ts $ARGS

      - name: Notify on failure
        if: failure()
        run: echo "::error::${{ matrix.parliament }} pipeline failed — check logs above"
